<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BookingCal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:#f4f6f9;min-height:100vh}
.app-header{background:linear-gradient(135deg,#5c6ac4,#202e78);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.app-header h1{font-size:20px;font-weight:600}
.badge{background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:12px;font-size:12px}
.container{max-width:1100px;margin:0 auto;padding:24px}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.nav-btns button{background:#fff;border:1px solid #ddd;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px}
.nav-btns button:hover{background:#5c6ac4;color:#fff;border-color:#5c6ac4}
.month-title{font-size:22px;font-weight:600;color:#1a1a2e}
.add-btn{background:#5c6ac4;color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:500;font-size:14px}
.add-btn:hover{background:#4959bd}
.calendar{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);overflow:hidden}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:#f8f9fb;border-bottom:1px solid #eee}
.weekdays div{padding:12px;text-align:center;font-weight:600;font-size:12px;color:#666;text-transform:uppercase}
.days{display:grid;grid-template-columns:repeat(7,1fr)}
.day{min-height:100px;border:1px solid #f0f0f0;padding:6px;cursor:pointer;position:relative}
.day:hover{background:#f8f9ff}
.day.today{background:#eef0ff}
.day.other-month{background:#fafafa;color:#ccc}
.day-num{font-size:13px;font-weight:500;margin-bottom:4px}
.ev{font-size:11px;padding:3px 6px;border-radius:4px;margin-bottom:2px;color:#fff;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ev.blue{background:#5c6ac4}.ev.green{background:#50b83c}.ev.red{background:#de3618}.ev.orange{background:#f49342}.ev.purple{background:#9c6ade}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:12px;padding:28px;width:420px;max-width:90vw;max-height:90vh;overflow-y:auto}
.modal h2{margin-bottom:20px;color:#1a1a2e}
.fg{margin-bottom:16px}
.fg label{display:block;margin-bottom:6px;font-weight:500;font-size:13px;color:#555}
.fg input,.fg textarea{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.fg input:focus,.fg textarea:focus{outline:none;border-color:#5c6ac4}
.fg textarea{resize:vertical;min-height:80px}
.colors{display:flex;gap:8px}
.co{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent}
.co.sel{border-color:#333;transform:scale(1.15)}
.mbtn{display:flex;gap:10px;margin-top:20px}
.mbtn button{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:500;font-size:14px}
.bsave{background:#5c6ac4;color:#fff}
.bcancel{background:#f4f6f8;color:#333}
.bdel{background:#de3618;color:#fff;margin-left:auto}
.elist{margin-top:24px;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:20px}
.elist h3{margin-bottom:14px;color:#1a1a2e}
.eitem{display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;border:1px solid #f0f0f0;margin-bottom:8px;cursor:pointer}
.eitem:hover{background:#f8f9ff;border-color:#5c6ac4}
.edot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.einfo .t{font-weight:500;font-size:14px}
.einfo .tm{font-size:12px;color:#888}
.sbar{background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;gap:16px;box-shadow:0 1px 4px rgba(0,0,0,0.05);font-size:13px;color:#555}
</style>
</head>
<body>
<div class="app-header"><h1>&#128197; BookingCal</h1><span class="badge">Shopify Add-on v1.0</span></div>
<div class="container">
<div class="sbar">Total Events: <strong id="tot">0</strong>&nbsp;&nbsp;This Month: <strong id="mon">0</strong>&nbsp;&nbsp;Upcoming: <strong id="upc">0</strong></div>
<div class="toolbar">
<div class="nav-btns"><button id="bp">&#8592; Prev</button><button id="bt">Today</button><button id="bn">Next &#8594;</button></div>
<span class="month-title" id="mt"></span>
<button class="add-btn" id="ba">+ New Event</button>
</div>
<div class="calendar"><div class="weekdays"><div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div></div><div class="days" id="cd"></div></div>
<div class="elist"><h3>&#128203; Upcoming Events</h3><div id="ul"></div></div>
</div>
<div class="modal-overlay" id="mo">
<div class="modal">
<h2 id="mh">New Event</h2>
<div class="fg"><label>Title</label><input type="text" id="ft" placeholder="Event name"></div>
<div class="fg"><label>Date</label><input type="date" id="fd"></div>
<div class="fg"><label>Start Time</label><input type="time" id="fs"></div>
<div class="fg"><label>End Time</label><input type="time" id="fe"></div>
<div class="fg"><label>Description</label><textarea id="fx" placeholder="Details..."></textarea></div>
<div class="fg"><label>Color</label>
<div class="colors">
<div class="co sel" data-c="blue" style="background:#5c6ac4"></div>
<div class="co" data-c="green" style="background:#50b83c"></div>
<div class="co" data-c="red" style="background:#de3618"></div>
<div class="co" data-c="orange" style="background:#f49342"></div>
<div class="co" data-c="purple" style="background:#9c6ade"></div>
</div></div>
<div class="mbtn"><button class="bsave" id="bs">Save</button><button class="bcancel" id="bc">Cancel</button><button class="bdel" id="bd" style="display:none">Delete</button></div>
</div>
</div>
<script>
var cur=new Date();
var evts=JSON.parse(localStorage.getItem("bcal")||"[]");
var eid=null;
var MS=["January","February","March","April","May","June","July","August","September","October","November","December"];
var CC={blue:"#5c6ac4",green:"#50b83c",red:"#de3618",orange:"#f49342",purple:"#9c6ade"};

function pad(n){return n<10?"0"+n:""+n;}

function render(){
  var y=cur.getFullYear(),m=cur.getMonth();
  document.getElementById("mt").textContent=MS[m]+" "+y;
  var f=new Date(y,m,1),sd=f.getDay(),td=new Date(y,m+1,0).getDate();
  var pl=new Date(y,m,0).getDate();
  var h="";
  for(var i=sd-1;i>=0;i--) h+='<div class="day other-month"><span class="day-num">'+(pl-i)+"</span></div>";
  for(var d=1;d<=td;d++){
    var ds=y+"-"+pad(m+1)+"-"+pad(d);
    var now=new Date();
    var it=d===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();
    var de=evts.filter(function(e){return e.date===ds;});
    var eh=de.slice(0,3).map(function(e){return '<div class="ev '+e.color+'" data-id="'+e.id+'">'+((e.time?e.time+" ":"")+e.title)+"</div>";}).join("");
    if(de.length>3) eh+='<div style="font-size:10px;color:#888">+'+(de.length-3)+" more</div>";
    h+='<div class="day'+(it?" today":"")+'" data-date="'+ds+'"><span class="day-num">'+d+"</span>"+eh+"</div>";
  }
  var rem=42-sd-td;
  for(var i=1;i<=rem;i++) h+='<div class="day other-month"><span class="day-num">'+i+"</span></div>";
  document.getElementById("cd").innerHTML=h;
  stats();ulist();
}

function stats(){
  var now=new Date(),m=cur.getMonth(),y=cur.getFullYear();
  document.getElementById("tot").textContent=evts.length;
  document.getElementById("mon").textContent=evts.filter(function(e){var d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y;}).length;
  document.getElementById("upc").textContent=evts.filter(function(e){return new Date(e.date+"T"+(e.time||"23:59"))>=now;}).length;
}

function ulist(){
  var now=new Date();
  var up=evts.filter(function(e){return new Date(e.date+"T"+(e.time||"23:59"))>=now;}).sort(function(a,b){return new Date(a.date+"T"+(a.time||"00:00"))-new Date(b.date+"T"+(b.time||"00:00"));}).slice(0,5);
  var el=document.getElementById("ul");
  if(!up.length){el.innerHTML='<p style="color:#888;font-size:14px">No upcoming events</p>';return;}
  el.innerHTML=up.map(function(e){return '<div class="eitem" data-id="'+e.id+'"><div class="edot" style="background:'+CC[e.color]+'"></div><div class="einfo"><div class="t">'+e.title+'</div><div class="tm">'+e.date+" "+(e.time||"")+(e.endTime?" - "+e.endTime:"")+"</div></div></div>";}).join("");
}

function openM(ds){
  eid=null;
  document.getElementById("mh").textContent="New Event";
  document.getElementById("ft").value="";
  document.getElementById("fd").value=ds||new Date().toISOString().split("T")[0];
  document.getElementById("fs").value="";
  document.getElementById("fe").value="";
  document.getElementById("fx").value="";
  document.getElementById("bd").style.display="none";
  document.querySelectorAll(".co").forEach(function(c){c.classList.remove("sel");});
  document.querySelector('[data-c="blue"]').classList.add("sel");
  document.getElementById("mo").classList.add("active");
}

function editE(id){
  var e=evts.find(function(x){return x.id===id;});
  if(!e)return;
  eid=id;
  document.getElementById("mh").textContent="Edit Event";
  document.getElementById("ft").value=e.title;
  document.getElementById("fd").value=e.date;
  document.getElementById("fs").value=e.time||"";
  document.getElementById("fe").value=e.endTime||"";
  document.getElementById("fx").value=e.desc||"";
  document.getElementById("bd").style.display="block";
  document.querySelectorAll(".co").forEach(function(c){c.classList.toggle("sel",c.getAttribute("data-c")===e.color);});
  document.getElementById("mo").classList.add("active");
}

function closeM(){document.getElementById("mo").classList.remove("active");}

document.getElementById("bp").addEventListener("click",function(){cur.setMonth(cur.getMonth()-1);render();});
document.getElementById("bn").addEventListener("click",function(){cur.setMonth(cur.getMonth()+1);render();});
document.getElementById("bt").addEventListener("click",function(){cur=new Date();render();});
document.getElementById("ba").addEventListener("click",function(){openM();});
document.getElementById("bc").addEventListener("click",closeM);
document.getElementById("mo").addEventListener("click",function(e){if(e.target===this)closeM();});

document.querySelectorAll(".co").forEach(function(c){
  c.addEventListener("click",function(){
    document.querySelectorAll(".co").forEach(function(x){x.classList.remove("sel");});
    c.classList.add("sel");
  });
});

document.getElementById("bs").addEventListener("click",function(){
  var title=document.getElementById("ft").value.trim();
  if(!title){alert("Please enter a title");return;}
  var ev={id:eid||Date.now().toString(36)+Math.random().toString(36).slice(2,7),title:title,date:document.getElementById("fd").value,time:document.getElementById("fs").value,endTime:document.getElementById("fe").value,desc:document.getElementById("fx").value,color:document.querySelector(".co.sel").getAttribute("data-c")};
  if(eid){evts=evts.map(function(e){return e.id===eid?ev:e;});}else{evts.push(ev);}
  localStorage.setItem("bcal",JSON.stringify(evts));
  closeM();render();
});

document.getElementById("bd").addEventListener("click",function(){
  if(!confirm("Delete this event?"))return;
  evts=evts.filter(function(e){return e.id!==eid;});
  localStorage.setItem("bcal",JSON.stringify(evts));
  closeM();render();
});

document.getElementById("cd").addEventListener("click",function(e){
  var ev=e.target.closest(".ev");
  if(ev){editE(ev.getAttribute("data-id"));return;}
  var day=e.target.closest(".day:not(.other-month)");
  if(day){openM(day.getAttribute("data-date"));}
});

document.getElementById("ul").addEventListener("click",function(e){
  var item=e.target.closest(".eitem");
  if(item) editE(item.getAttribute("data-id"));
});

if(!evts.length){
  var t=new Date(),y=t.getFullYear(),m=t.getMonth(),d=t.getDate();
  evts=[
    {id:"s1",title:"Team Standup",date:y+"-"+pad(m+1)+"-"+pad(d),time:"09:00",endTime:"09:30",desc:"Daily sync",color:"blue"},
    {id:"s2",title:"Client Call",date:y+"-"+pad(m+1)+"-"+pad(Math.min(d+1,28)),time:"14:00",endTime:"15:00",desc:"Project discussion",color:"green"},
    {id:"s3",title:"Product Launch",date:y+"-"+pad(m+1)+"-"+pad(Math.min(d+3,28)),time:"10:00",endTime:"12:00",desc:"Feature release",color:"red"},
    {id:"s4",title:"Workshop",date:y+"-"+pad(m+1)+"-"+pad(Math.min(d+5,28)),time:"13:00",endTime:"16:00",desc:"Training session",color:"purple"}
  ];
  localStorage.setItem("bcal",JSON.stringify(evts));
}
render();
</script>
</body>
</html>
