<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>BookingCal - Shopify Calendar App</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f4f6f9;min-height:100vh}
.app-header{background:linear-gradient(135deg,#5c6ac4,#202e78);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.app-header h1{font-size:20px;font-weight:600}
.badge{background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:12px;font-size:12px}
.container{max-width:1100px;margin:0 auto;padding:24px}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.nav-btns button{background:#fff;border:1px solid #ddd;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px;transition:all .2s}
.nav-btns button:hover{background:#5c6ac4;color:#fff;border-color:#5c6ac4}
.month-title{font-size:22px;font-weight:600;color:#1a1a2e}
.add-btn{background:#5c6ac4;color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:500;font-size:14px}
.add-btn:hover{background:#4959bd}
.calendar{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);overflow:hidden}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:#f8f9fb;border-bottom:1px solid #eee}
.weekdays div{padding:12px;text-align:center;font-weight:600;font-size:12px;color:#666;text-transform:uppercase}
.days{display:grid;grid-template-columns:repeat(7,1fr)}
.day{min-height:100px;border:1px solid #f0f0f0;padding:6px;cursor:pointer;transition:background .2s;position:relative}
.day:hover{background:#f8f9ff}
.day.today{background:#eef0ff}
.day.other-month{background:#fafafa;color:#ccc}
.day-num{font-size:13px;font-weight:500;margin-bottom:4px}
.event{font-size:11px;padding:3px 6px;border-radius:4px;margin-bottom:2px;color:#fff;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.event.blue{background:#5c6ac4}.event.green{background:#50b83c}.event.red{background:#de3618}.event.orange{background:#f49342}.event.purple{background:#9c6ade}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:12px;padding:28px;width:420px;max-width:90vw;max-height:90vh;overflow-y:auto}
.modal h2{margin-bottom:20px;color:#1a1a2e;font-size:18px}
.form-group{margin-bottom:16px}
.form-group label{display:block;margin-bottom:6px;font-weight:500;font-size:13px;color:#555}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;transition:border .2s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:#5c6ac4}
.form-group textarea{resize:vertical;min-height:80px}
.color-options{display:flex;gap:8px}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.color-opt.selected{border-color:#333;transform:scale(1.15)}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-btns button{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:500;font-size:14px}
.btn-save{background:#5c6ac4;color:#fff}.btn-save:hover{background:#4959bd}
.btn-cancel{background:#f4f6f8;color:#333}.btn-cancel:hover{background:#e8ebee}
.btn-delete{background:#de3618;color:#fff;margin-left:auto}.btn-delete:hover{background:#b52d14}
.event-list{margin-top:24px;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:20px}
.event-list h3{margin-bottom:14px;color:#1a1a2e}
.event-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;border:1px solid #f0f0f0;margin-bottom:8px;cursor:pointer;transition:all .2s}
.event-item:hover{background:#f8f9ff;border-color:#5c6ac4}
.event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.event-info{flex:1}
.event-info .title{font-weight:500;font-size:14px}
.event-info .time{font-size:12px;color:#888}
.status-bar{background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:16px;box-shadow:0 1px 4px rgba(0,0,0,0.05);font-size:13px;color:#555}
.status-bar .stat{display:flex;align-items:center;gap:4px}
.status-bar .stat strong{color:#1a1a2e}
</style></head><body>
<div class="app-header"><h1>📅 BookingCal</h1><span class="badge">Shopify Add-on v1.0</span></div>
<div class="container">
<div class="status-bar"><div class="stat">Total Events: <strong id="totalEvents">0</strong></div><div class="stat">This Month: <strong id="monthEvents">0</strong></div><div class="stat">Upcoming: <strong id="upcomingEvents">0</strong></div></div>
<div class="toolbar"><div class="nav-btns"><button onclick="prevMonth()">&#8592; Prev</button><button onclick="goToday()">Today</button><button onclick="nextMonth()">Next &#8594;</button></div><span class="month-title" id="monthTitle"></span><button class="add-btn" onclick="openModal()">+ New Event</button></div>
<div class="calendar"><div class="weekdays"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div><div class="days" id="calendarDays"></div></div>
<div class="event-list"><h3>📋 Upcoming Events</h3><div id="upcomingList"></div></div></div>
<div class="modal-overlay" id="modalOverlay"><div class="modal"><h2 id="modalTitle">New Event</h2>
<div class="form-group"><label>Title</label><input type="text" id="eventTitle" placeholder="Event name..."></div>
<div class="form-group"><label>Date</label><input type="date" id="eventDate"></div>
<div class="form-group"><label>Time</label><input type="time" id="eventTime"></div>
<div class="form-group"><label>End Time</label><input type="time" id="eventEndTime"></div>
<div class="form-group"><label>Description</label><textarea id="eventDesc" placeholder="Details..."></textarea></div>
<div class="form-group"><label>Color</label><div class="color-options"><div class="color-opt selected" data-color="blue" style="background:#5c6ac4" onclick="selectColor(this)"></div><div class="color-opt" data-color="green" style="background:#50b83c" onclick="selectColor(this)"></div><div class="color-opt" data-color="red" style="background:#de3618" onclick="selectColor(this)"></div><div class="color-opt" data-color="orange" style="background:#f49342" onclick="selectColor(this)"></div><div class="color-opt" data-color="purple" style="background:#9c6ade" onclick="selectColor(this)"></div></div></div>
<div class="modal-btns"><button class="btn-save" onclick="saveEvent()">Save</button><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-delete" id="deleteBtn" style="display:none" onclick="deleteEvent()">Delete</button></div></div></div>
<script>
let currentDate=new Date(),events=JSON.parse(localStorage.getItem('bookingcal_events')||'[]'),editingId=null;
const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
function render(){const y=currentDate.getFullYear(),m=currentDate.getMonth();document.getElementById('monthTitle').textContent=months[m]+' '+y;const first=new Date(y,m,1),last=new Date(y,m+1,0),startDay=first.getDay(),totalDays=last.getDate();let html='';const prevLast=new Date(y,m,0).getDate();for(let i=startDay-1;i>=0;i--)html+='<div class="day other-month"><span class="day-num">'+(prevLast-i)+'</span></div>';for(let d=1;d<=totalDays;d++){const dateStr=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');const today=new Date();const isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();const dayEvents=events.filter(function(e){return e.date===dateStr});let evHtml=dayEvents.slice(0,3).map(function(e){return '<div class="event '+e.color+'" onclick="event.stopPropagation();editEvent(''+e.id+'')">'+((e.time?e.time+' ':'')+e.title)+'</div>'}).join('');if(dayEvents.length>3)evHtml+='<div style="font-size:10px;color:#888">+'+(dayEvents.length-3)+' more</div>';html+='<div class="day'+(isToday?' today':'')+'" onclick="openModal(''+dateStr+'')"><span class="day-num">'+d+'</span>'+evHtml+'</div>'}const remaining=42-startDay-totalDays;for(let i=1;i<=remaining;i++)html+='<div class="day other-month"><span class="day-num">'+i+'</span></div>';document.getElementById('calendarDays').innerHTML=html;updateStats();renderUpcoming()}
function updateStats(){const now=new Date(),m=currentDate.getMonth(),y=currentDate.getFullYear();document.getElementById('totalEvents').textContent=events.length;document.getElementById('monthEvents').textContent=events.filter(function(e){const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y}).length;document.getElementById('upcomingEvents').textContent=events.filter(function(e){return new Date(e.date+'T'+(e.time||'23:59'))>=now}).length}
function renderUpcoming(){const now=new Date(),upcoming=events.filter(function(e){return new Date(e.date+'T'+(e.time||'23:59'))>=now}).sort(function(a,b){return new Date(a.date+'T'+(a.time||'00:00'))-new Date(b.date+'T'+(b.time||'00:00'))}).slice(0,5);const el=document.getElementById('upcomingList');if(!upcoming.length){el.innerHTML='<p style="color:#888;font-size:14px">No upcoming events</p>';return}el.innerHTML=upcoming.map(function(e){var colors={blue:'#5c6ac4',green:'#50b83c',red:'#de3618',orange:'#f49342',purple:'#9c6ade'};return '<div class="event-item" onclick="editEvent(''+e.id+'')"><div class="event-dot" style="background:'+colors[e.color]+'"></div><div class="event-info"><div class="title">'+e.title+'</div><div class="time">'+e.date+' '+(e.time||'')+' '+(e.endTime?'- '+e.endTime:'')+'</div></div></div>'}).join('')}
function prevMonth(){currentDate.setMonth(currentDate.getMonth()-1);render()}
function nextMonth(){currentDate.setMonth(currentDate.getMonth()+1);render()}
function goToday(){currentDate=new Date();render()}
function openModal(dateStr){editingId=null;document.getElementById('modalTitle').textContent='New Event';document.getElementById('eventTitle').value='';document.getElementById('eventDate').value=dateStr||new Date().toISOString().split('T')[0];document.getElementById('eventTime').value='';document.getElementById('eventEndTime').value='';document.getElementById('eventDesc').value='';document.getElementById('deleteBtn').style.display='none';document.querySelectorAll('.color-opt').forEach(function(c){c.classList.remove('selected')});document.querySelector('[data-color="blue"]').classList.add('selected');document.getElementById('modalOverlay').classList.add('active')}
function editEvent(id){var e=events.find(function(ev){return ev.id===id});if(!e)return;editingId=id;document.getElementById('modalTitle').textContent='Edit Event';document.getElementById('eventTitle').value=e.title;document.getElementById('eventDate').value=e.date;document.getElementById('eventTime').value=e.time||'';document.getElementById('eventEndTime').value=e.endTime||'';document.getElementById('eventDesc').value=e.desc||'';document.getElementById('deleteBtn').style.display='block';document.querySelectorAll('.color-opt').forEach(function(c){c.classList.toggle('selected',c.dataset.color===e.color)});document.getElementById('modalOverlay').classList.add('active')}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active')}
function selectColor(el){document.querySelectorAll('.color-opt').forEach(function(c){c.classList.remove('selected')});el.classList.add('selected')}
function saveEvent(){var title=document.getElementById('eventTitle').value.trim();if(!title)return alert('Please enter a title');var ev={id:editingId||Date.now().toString(36)+Math.random().toString(36).slice(2,7),title:title,date:document.getElementById('eventDate').value,time:document.getElementById('eventTime').value,endTime:document.getElementById('eventEndTime').value,desc:document.getElementById('eventDesc').value,color:document.querySelector('.color-opt.selected').dataset.color};if(editingId)events=events.map(function(e){return e.id===editingId?ev:e});else events.push(ev);localStorage.setItem('bookingcal_events',JSON.stringify(events));closeModal();render()}
function deleteEvent(){if(!confirm('Delete this event?'))return;events=events.filter(function(e){return e.id!==editingId});localStorage.setItem('bookingcal_events',JSON.stringify(events));closeModal();render()}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===e.currentTarget)closeModal()});
if(!events.length){var today=new Date(),y=today.getFullYear(),m=today.getMonth();events=[{id:'s1',title:'Team Standup',date:y+'-'+String(m+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0'),time:'09:00',endTime:'09:30',desc:'Daily sync with the team',color:'blue'},{id:'s2',title:'Client Call',date:y+'-'+String(m+1).padStart(2,'0')+'-'+String(Math.min(today.getDate()+1,28)).padStart(2,'0'),time:'14:00',endTime:'15:00',desc:'Discuss project requirements',color:'green'},{id:'s3',title:'Product Launch',date:y+'-'+String(m+1).padStart(2,'0')+'-'+String(Math.min(today.getDate()+3,28)).padStart(2,'0'),time:'10:00',endTime:'12:00',desc:'New feature release',color:'red'},{id:'s4',title:'Workshop',date:y+'-'+String(m+1).padStart(2,'0')+'-'+String(Math.min(today.getDate()+5,28)).padStart(2,'0'),time:'13:00',endTime:'16:00',desc:'Calendar app training',color:'purple'}];localStorage.setItem('bookingcal_events',JSON.stringify(events))}
render();
</script></body></html>
